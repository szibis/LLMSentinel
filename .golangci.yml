run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - bodyclose
    - copyloopvar
    - goprintffuncname
    - misspell
    - nolintlint
    - unparam
    - whitespace
    - gosec
    - gocyclo
    - gofmt
    - goimports
    - gosimple
  disable:
    - errcheck
    - unused
    - goconst

linters-settings:
  misspell:
    locale: US
  gocyclo:
    min-complexity: 15
  lll:
    line-length: 120

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go$
      linters:
        - gocyclo
    - path: _test\.go$
      linters:
        - lll
